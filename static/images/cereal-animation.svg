<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="cerealGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6D4C2A"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </radialGradient>
    <linearGradient id="bowlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8C4D0"/>
      <stop offset="30%" stop-color="#CDD6DE"/>
      <stop offset="100%" stop-color="#95A3B0"/>
    </linearGradient>
    <linearGradient id="bowlInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C5CDD6"/>
      <stop offset="100%" stop-color="#B0BAC4"/>
    </linearGradient>
    <clipPath id="insideBowl">
      <path d="M220,340 Q400,380 580,340 Q585,480 400,480 Q215,480 220,340 Z"/>
    </clipPath>
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="60%" stop-color="#1a2636"/>
      <stop offset="100%" stop-color="#0c1420"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#vignette)"/>

  <!-- Countertop -->
  <rect x="0" y="480" width="800" height="120" fill="#1e1410"/>
  <rect x="0" y="480" width="800" height="6" fill="#2a1e16"/>
  <rect x="0" y="480" width="800" height="2" fill="#3a2e24" opacity="0.6"/>

  <!-- Bowl shadow -->
  <ellipse cx="400" cy="482" rx="160" ry="16" fill="rgba(0,0,0,0.1)"/>

  <!-- Bowl outer body -->
  <path d="M210,335 Q215,485 400,485 Q585,485 590,335" fill="url(#bowlGrad)" stroke="#C0C0C0" stroke-width="1.5"/>

  <!-- Bowl rim (back half) -->
  <ellipse cx="400" cy="335" rx="195" ry="50" fill="#BCC6D0" stroke="#8E9CAA" stroke-width="1"/>

  <!-- Bowl interior -->
  <ellipse cx="400" cy="337" rx="185" ry="44" fill="url(#bowlInner)"/>

  <!-- ============ MILK FILL ============ -->
  <g clip-path="url(#insideBowl)">
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0;0" keyTimes="0;0.39;0.44;0.7;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,60;0,60;0,0;0,0;0,0;0,60" keyTimes="0;0.39;0.6;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
        <!-- Milk body -->
        <rect x="200" y="350" width="400" height="180" fill="rgba(255,250,235,0.92)"/>
        <rect x="200" y="350" width="400" height="180" fill="rgba(245,235,200,0.1)"/>
        <!-- Milk surface -->
        <ellipse cx="400" cy="352" rx="180" ry="30" fill="rgba(255,252,240,0.95)"/>
        <!-- Surface highlights -->
        <ellipse cx="375" cy="348" rx="90" ry="12" fill="white" opacity="0.45"/>
        <ellipse cx="440" cy="350" rx="35" ry="7" fill="white" opacity="0.25"/>
      </g>
    </g>
  </g>

  <!-- ============ CEREAL PIECES ============ -->

  <!-- Piece 1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.028;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.028;0.098;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="340" y="405" width="22" height="22" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(12,351,416)"/>
  </g>

  <!-- Piece 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.049;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.049;0.119;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="440" y="400" width="20" height="20" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(-10,450,410)"/>
  </g>

  <!-- Piece 3 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.07;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.07;0.14;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="290" y="410" width="24" height="24" rx="5" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(25,302,422)"/>
  </g>

  <!-- Piece 4 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.091;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.091;0.161;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="490" y="408" width="21" height="21" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(-18,500,418)"/>
  </g>

  <!-- Piece 5 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.112;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.112;0.182;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="380" y="415" width="23" height="23" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(6,391,426)"/>
  </g>

  <!-- Piece 6 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.133;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.133;0.203;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="260" y="400" width="20" height="20" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(-22,270,410)"/>
  </g>

  <!-- Piece 7 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.154;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.154;0.224;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="520" y="403" width="22" height="22" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(15,531,414)"/>
  </g>

  <!-- Piece 8 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.175;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.175;0.245;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="415" y="398" width="20" height="20" rx="5" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(-5,425,408)"/>
  </g>

  <!-- Piece 9 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.196;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.196;0.266;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="315" y="395" width="21" height="21" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(20,325,405)"/>
  </g>

  <!-- Piece 10 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.217;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.217;0.287;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="465" y="412" width="22" height="22" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(-12,476,423)"/>
  </g>

  <!-- Piece 11 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.238;0.82;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,-420;0,-420;0,0;0,0;0,-60;0,-60;0,-60;0,-420" keyTimes="0;0.238;0.308;0.385;0.595;0.7;0.82;1" dur="10s" repeatCount="indefinite"/>
    <rect x="365" y="390" width="23" height="23" rx="4" fill="url(#cerealGrad)" stroke="#2E1B0E" stroke-width="0.8" transform="rotate(10,376,401)"/>
  </g>

  <!-- Bowl front rim -->
  <path d="M210,335 Q400,400 590,335" fill="none" stroke="#9EAAB6" stroke-width="5"/>
  <path d="M210,335 Q400,398 590,335" fill="none" stroke="#CDD6DE" stroke-width="2" opacity="0.5"/>

  <!-- Bowl body highlight -->
  <path d="M280,410 Q350,455 400,460" fill="none" stroke="white" stroke-width="3" opacity="0.15" stroke-linecap="round"/>

  <!-- ============ GLASS OF MILK (static, tilted 55deg) ============ -->
  <g transform="rotate(55 295 105)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.322;0.336;0.644;0.672;0.7;1" dur="10s" repeatCount="indefinite"/>

    <!-- Glass body -->
    <path d="M200,105 L190,250 Q190,265 210,265 L280,265 Q300,265 300,250 L290,105" fill="rgba(215,230,250,0.18)" stroke="rgba(160,185,215,0.55)" stroke-width="2"/>

    <!-- Milk inside glass -->
    <clipPath id="glassClip">
      <path d="M200,105 L190,250 Q190,265 210,265 L280,265 Q300,265 300,250 L290,105 Z"/>
    </clipPath>
    <g clip-path="url(#glassClip)">
      <path d="M290,115 L200,220 L192,262 Q192,265 210,265 L280,265 Q298,265 298,250 L290,115 Z" fill="rgba(255,248,230,0.82)"/>
      <line x1="290" y1="115" x2="200" y2="220" stroke="rgba(255,250,235,0.95)" stroke-width="4"/>
      <line x1="290" y1="115" x2="200" y2="220" stroke="white" stroke-width="2" opacity="0.4"/>
    </g>

    <!-- Glass rim -->
    <ellipse cx="245" cy="105" rx="46" ry="10" fill="none" stroke="rgba(160,185,215,0.6)" stroke-width="2"/>
    <ellipse cx="245" cy="105" rx="45" ry="9.5" fill="rgba(215,230,250,0.1)"/>

    <!-- Glass bottom rim -->
    <ellipse cx="245" cy="263" rx="36" ry="5" fill="none" stroke="rgba(160,185,215,0.3)" stroke-width="1"/>

    <!-- Shine streaks -->
    <line x1="218" y1="115" x2="212" y2="250" stroke="white" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
    <line x1="270" y1="115" x2="276" y2="250" stroke="white" stroke-width="2" opacity="0.15" stroke-linecap="round"/>
  </g>

  <!-- Milk pouring stream -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.95;0.95;0;0;0" keyTimes="0;0.35;0.385;0.406;0.581;0.616;0.7;1" dur="10s" repeatCount="indefinite"/>
    <path d="M295,105 Q340,220 380,340" fill="none" stroke="rgba(255,248,230,0.9)" stroke-width="13" stroke-linecap="round">
      <animate attributeName="d" values="M295,105 Q340,220 380,340;M295,105 Q345,225 385,340;M295,105 Q340,220 380,340" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M296,108 Q341,222 379,335" fill="none" stroke="rgba(255,253,240,0.7)" stroke-width="5" stroke-linecap="round" opacity="0.55">
      <animate attributeName="d" values="M296,108 Q341,222 379,335;M296,108 Q346,227 384,335;M296,108 Q341,222 379,335" dur="0.4s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="rgba(255,248,230,0.75)">
      <animate attributeName="cx" values="380;365;380" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="340;325;340" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="white" opacity="0.5">
      <animate attributeName="cx" values="388;398;388" dur="0.35s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="335;322;335" dur="0.35s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
