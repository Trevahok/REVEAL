<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#9ad7ff"/>
      <stop offset="1" stop-color="#eaf6ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7fd38b"/>
      <stop offset="1" stop-color="#4fb06a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Clip to the inner frame so the zoom never "escapes" visually -->
    <clipPath id="viewportClip">
      <rect x="40" y="40" width="640" height="240" rx="18"/>
    </clipPath>
  </defs>

  <!-- Frame -->
  <rect x="20" y="20" width="680" height="280" rx="24" fill="#11151c" opacity="0.08"/>
  <rect x="40" y="40" width="640" height="240" rx="18" fill="#ffffff"/>

  <!-- Everything inside this group is clipped to the viewport -->
  <g clip-path="url(#viewportClip)">

    <!-- "Camera" zoom effect:
         Transform order is important. We zoom around the center of the viewport (360,160),
         and also pan slightly to keep the target (house) near center. -->
    <g>
      <!-- Zoom about center of viewport -->
      <animateTransform attributeName="transform" attributeType="XML" type="translate" additive="replace" values="360 160; 360 160; 360 160" keyTimes="0;1;1" dur="3.2s" repeatCount="indefinite"/>

      <animateTransform attributeName="transform" attributeType="XML" type="scale" additive="sum" values="1; 1.35; 1.75" keyTimes="0;0.65;1" dur="3.2s" repeatCount="indefinite"/>

      <animateTransform attributeName="transform" attributeType="XML" type="translate" additive="sum" values="-360 -160; -360 -160; -360 -160" keyTimes="0;1;1" dur="3.2s" repeatCount="indefinite"/>

      <!-- Gentle pan towards the house while zooming (kept small to avoid drifting out) -->
      <animateTransform attributeName="transform" attributeType="XML" type="translate" additive="sum" values="0 0; -26 -10; -46 -16" keyTimes="0;0.65;1" dur="3.2s" repeatCount="indefinite"/>

      <!-- Landscape content -->
      <g>
        <rect x="40" y="40" width="640" height="170" fill="url(#sky)"/>
        <rect x="40" y="210" width="640" height="70" fill="url(#ground)"/>

        <circle cx="120" cy="90" r="28" fill="#ffd36a"/>
        <circle cx="120" cy="90" r="40" fill="#ffd36a" opacity="0.25" filter="url(#soft)"/>

        <path d="M40 210 L160 125 L260 185 L340 120 L440 195 L540 140 L680 210 Z" fill="#6aa3c9" opacity="0.85"/>
        <path d="M40 210 L190 150 L280 190 L370 145 L470 200 L560 160 L680 210 Z" fill="#4f8fb9" opacity="0.75"/>

        <ellipse cx="500" cy="230" rx="110" ry="26" fill="#4aa3d8" opacity="0.55"/>
        <ellipse cx="500" cy="233" rx="96" ry="18" fill="#2f7fb0" opacity="0.35"/>

        <path d="M40 280 C160 230, 300 250, 410 280 C520 310, 600 300, 680 275 L680 320 L40 320 Z" fill="#3e9c5a" opacity="0.95"/>

        <!-- target house -->
        <g id="house" transform="translate(410,175)">
          <rect x="0" y="22" width="62" height="44" rx="6" fill="#f4efe6" stroke="#6b6b6b" stroke-opacity="0.25"/>
          <path d="M-6 26 L31 0 L68 26 Z" fill="#d35b5b"/>
          <rect x="24" y="42" width="16" height="24" rx="3" fill="#8a5a3c"/>
          <rect x="8" y="34" width="14" height="12" rx="2" fill="#7cc7ff" opacity="0.9"/>
          <rect x="44" y="34" width="14" height="12" rx="2" fill="#7cc7ff" opacity="0.9"/>
        </g>

        <g opacity="0.95">
          <g transform="translate(170,190)">
            <rect x="10" y="32" width="8" height="26" rx="3" fill="#6b4a2f"/>
            <circle cx="14" cy="26" r="18" fill="#2f7d4d"/>
          </g>
          <g transform="translate(250,198) scale(0.9)">
            <rect x="10" y="32" width="8" height="26" rx="3" fill="#6b4a2f"/>
            <circle cx="14" cy="26" r="18" fill="#2f7d4d"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- viewport border on top -->
  <rect x="40" y="40" width="640" height="240" rx="18" fill="none" stroke="#000" stroke-opacity="0.12"/>

</svg>