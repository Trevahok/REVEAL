<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <clipPath id="yardClip">
      <rect x="40" y="40" width="640" height="240" rx="18"/>
    </clipPath>

    <!-- Person (stationary) -->
    <g id="person">
      <ellipse cx="360" cy="252" rx="80" ry="14" fill="#000" opacity="0.20"/>
      <path d="M315 252                C315 212, 337 190, 360 190                C383 190, 405 212, 405 252                C405 280, 394 292, 360 292                C326 292, 315 280, 315 252Z" fill="#2b2f3a"/>
      <circle cx="360" cy="160" r="32" fill="#2b2f3a"/>
      <rect x="344" y="190" width="32" height="16" rx="7" fill="#2b2f3a"/>
      <circle cx="350" cy="150" r="6" fill="#fff" opacity="0.18"/>
    </g>

    <!-- Background -->
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cfe3ff"/>
      <stop offset="1" stop-color="#f6fbff"/>
    </linearGradient>

    <!-- Black bar pattern. Animate the pattern offset for robust motion.
         Thicker bars + faster speed (1.5x faster than 0.7s => ~0.4667s). -->
    <pattern id="grate" x="0" y="0" width="28" height="240" patternUnits="userSpaceOnUse">
      <!-- thicker bar -->
      <rect x="0" y="0" width="20" height="240" fill="#050607"/>
      <!-- remaining 8px is the gap -->
      <animate attributeName="x" values="0;28" dur="0.4667s" repeatCount="indefinite"/>
    </pattern>
  </defs>

  <!-- Frame -->
  <rect x="20" y="20" width="680" height="280" rx="24" fill="#11151c" opacity="0.08"/>
  <rect x="40" y="40" width="640" height="240" rx="18" fill="url(#bg)"/>

  <g clip-path="url(#yardClip)">
    <!-- ground -->
    <rect x="40" y="212" width="640" height="68" fill="#7dcf8b"/>
    <rect x="40" y="228" width="640" height="52" fill="#65be76" opacity="0.55"/>

    <!-- stationary person behind the grate -->
    <use href="#person"/>

    <!-- moving grate overlay -->
    <rect x="40" y="40" width="640" height="240" fill="url(#grate)" opacity="0.96"/>

    <!-- subtle dark overlay to sell "behind bars" -->
    <rect x="40" y="40" width="640" height="240" fill="#000" opacity="0.10"/>
  </g>

</svg>